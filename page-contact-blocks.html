<!-- ================================================================
     PRIAM — CONTACT PAGE GUTENBERG BLOCK CONTENT
     Page title: Contact | Page slug: contact
     ================================================================ -->

<!-- wp:html -->
<section class="pd-section-tight" style="padding-top:clamp(48px,7vw,84px);" aria-labelledby="contact-heading">
  <div class="pd-wrap" style="max-width:600px;margin:0 auto;">

    <div class="reveal" style="text-align:center;margin-bottom:36px;">
      <span class="eyebrow">Get in touch</span>
      <h1 id="contact-heading" style="font-size:clamp(32px,5vw,52px);margin-top:12px;line-height:1.18;">Book a walkthrough.</h1>
      <p class="lede" style="margin-top:16px;">Fill in your details and we'll be in touch within one business day.</p>
    </div>

    <div class="card reveal" style="padding:clamp(28px,4vw,48px);">
      <form id="pd-contact-form" class="pd-form" novalidate aria-label="Contact form">
        <div style="display:flex;flex-direction:column;gap:16px;">

          <div>
            <label for="contact-name">Full name <span aria-hidden="true">*</span></label>
            <input id="contact-name" name="pd_name" type="text" required placeholder="Your name" autocomplete="name">
          </div>

          <div>
            <label for="contact-email">Work email <span aria-hidden="true">*</span></label>
            <input id="contact-email" name="pd_email" type="email" required placeholder="you@company.com" autocomplete="email">
          </div>

          <div>
            <label for="contact-company">Company <span style="color:var(--muted);font-weight:400;">(optional)</span></label>
            <input id="contact-company" name="pd_company" type="text" placeholder="Your company" autocomplete="organization">
          </div>

          <div>
            <label for="contact-message">Message <span aria-hidden="true">*</span></label>
            <textarea id="contact-message" name="pd_message" rows="5" required placeholder="Tell us about your business and what you'd like to see in the walkthrough."></textarea>
          </div>

          [pd_turnstile action="contact"]

          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Send message →</button>

          <div class="pd-formmsg" role="alert" aria-live="polite">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
            <span class="pd-formmsg-text">Message sent! We will be in touch within one business day.</span>
          </div>

        </div>
      </form>
    </div>

  </div>
</section>
<!-- /wp:html -->
