<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 93" width="320" role="img" fill="none" aria-label="PRIAM logo — dark variant">

  <title>PRIAM — dark variant</title>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0.2" dy="0.8" stdDeviation="0.4"></feDropShadow>
    </filter>
  </defs>

  
  
  

  
  <g transform="translate(11 10)">
    <circle cx="36" cy="36" r="42" fill="none" stroke="#FB923C" stroke-width="3" stroke-dasharray="9 6" filter="url(#shadow)"></circle>

    
    <g stroke="#E8F4F0" stroke-width="1" opacity="0.45" filter="url(#shadow)">
      <line x1="62.56" y1="42.441" x2="42" y2="62"></line>
      <line x1="60.588" y1="30.385" x2="41.858" y2="11.269"></line>
      <line x1="9.917" y1="42.165" x2="29.495" y2="61.257"></line>
      <line x1="30.665" y1="10.803" x2="10.651" y2="30.394"></line>
    </g>

    
    <g fill="#0F6E56" filter="url(#shadow)">
      <circle cx="36" cy="6" r="8"></circle>
      <circle cx="66" cy="36" r="8"></circle>
      <circle cx="36" cy="66" r="8"></circle>
      <circle cx="6" cy="36" r="8"></circle>
    </g>

    
    <g font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#9FE1CB" text-anchor="middle" filter="url(#shadow)">
      <text x="36" y="9">P</text>
      <text x="66" y="39">R</text>
      <text x="36" y="69.5">I</text>
      <text x="5.5" y="39">A</text>
    </g>

    
    <circle cx="36" cy="36" r="14" fill="none" stroke="#9FE1CB" stroke-width="1" opacity="0.35"></circle>
    <circle cx="36" cy="36" r="12" fill="#085041" filter="url(#shadow)"></circle>

    <text x="36" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#E1F5EE" filter="url(#shadow)">M</text>
  </g>

  
  <g transform="translate(96 50)">
    <text x="0" y="-6" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" letter-spacing="3" fill="#E8F4F0" filter="url(#shadow)">PRIAM</text>

    <text x="2" y="12" font-family="system-ui, -apple-system, sans-serif" font-size="10" letter-spacing="2.2" fill="#5DCAA5" filter="url(#shadow)">
